<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paathukaapalan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 480px;
      background: #c0392b;
      color: white;
      border-radius: 16px 16px 0 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon {
      font-size: 28px;
    }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2ecc71; display: inline-block; margin-right: 5px;
    }

    /* ── Alert banner ── */
    .alert-banner {
      width: 100%;
      max-width: 480px;
      background: #fdedec;
      border-left: 4px solid #c0392b;
      padding: 10px 16px;
      font-size: 13px;
      color: #7b241c;
      font-weight: 500;
    }

    /* ── Chat window ── */
    .chat-window {
      width: 100%;
      max-width: 480px;
      background: white;
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.bot .bubble {
      background: #f0f2f5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }
    .msg.user .bubble {
      background: #c0392b;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg.user .msg-time { text-align: right; }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      width: 100%;
      max-width: 480px;
      background: white;
      border-top: 1px solid #eee;
      border-radius: 0 0 16px 16px;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .input-area input:focus { border-color: #c0392b; }
    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #c0392b;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #a93226; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── Quick dial buttons ── */
    .quick-dial {
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .dial-btn {
      flex: 1;
      min-width: 120px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
      color: #1a1a1a;
    }
    .dial-btn:hover { background: #fdedec; border-color: #c0392b; }
    .dial-btn .dial-num { font-weight: 700; color: #c0392b; font-size: 15px; display: block; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🚨</div>
    <div>
      <div class="header-title">PAATHUKAAPAALAN</div>
      <div class="header-sub"><span class="status-dot"></span>Active · Chennai</div>
    </div>
  </div>

  <!-- Alert banner -->
  <div class="alert-banner">
    🔴 Real emergency? Call <strong>108</strong> immediately before using this chat.
  </div>

  <!-- Chat messages -->
  <div class="chat-window" id="chatWindow"></div>

  <!-- Input -->
  <div class="input-area">
    <input
      type="text"
      id="userInput"
      placeholder="Describe the emergency..."
      autocomplete="off"
    />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <!-- Quick dial -->
  <div class="quick-dial">
    <div class="dial-btn" onclick="window.location='tel:108'">
      <span class="dial-num">108</span>Ambulance
    </div>
    <div class="dial-btn" onclick="window.location='tel:100'">
      <span class="dial-num">100</span>Police
    </div>
    <div class="dial-btn" onclick="window.location='tel:101'">
      <span class="dial-num">101</span>Fire
    </div>
  </div>

  <script>
    const chatWindow = document.getElementById("chatWindow");
    const userInput  = document.getElementById("userInput");
    const sendBtn    = document.getElementById("sendBtn");

    // Conversation history sent to the server
    let history = [];

    // Format current time as HH:MM
    function timeNow() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    // Add a message bubble to the chat
    function addMessage(role, text) {
      const wrapper = document.createElement("div");
      wrapper.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      const time = document.createElement("div");
      time.className = "msg-time";
      time.textContent = timeNow();

      wrapper.appendChild(bubble);
      wrapper.appendChild(time);
      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return wrapper;
    }

    // Show animated typing indicator
    function showTyping() {
      const wrapper = document.createElement("div");
      wrapper.className = "msg bot typing";
      wrapper.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return wrapper;
    }

    // Send message to backend and display reply
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = "";
      sendBtn.disabled = true;
      addMessage("user", text);

      history.push({ role: "user", content: text });

      const typingEl = showTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ history })
        });

        const data = await res.json();
        typingEl.remove();

        if (data.error) {
          addMessage("bot", "⚠️ " + data.error);
        } else {
          addMessage("bot", data.reply);
          history.push({ role: "assistant", content: data.reply });
        }

      } catch (err) {
        typingEl.remove();
        addMessage("bot", "⚠️ Could not reach the server. Make sure server.py is running.");
      }

      sendBtn.disabled = false;
      userInput.focus();
    }

    // Send on Enter key
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // Opening message on load
    window.onload = () => {
      addMessage("bot",
        "Hi — if this is a real emergency, please call 108 right now first.\n\n" +
        "I'm RoadSOS Emergency Assistant. Send me:\n\n" +
        "1. What happened (one short line)\n" +
        "2. Whether it's you or someone else\n" +
        "3. Your area / landmark in Chennai\n\n" +
        "I'll find the nearest hospital and give you first-aid steps."
      );
    };
  </script>
</body>
</html>
